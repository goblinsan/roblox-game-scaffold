# CI: code-style lint + Wally install + Rojo build
#
# Runs on every push to main and on every pull request to catch broken
# scaffold changes and code-quality regressions before they land.
#
# Jobs
# ────
#   lint   – StyLua formatting check + Selene static analysis (runs in parallel)
#   build  – Wally install + Rojo build for every game and the scaffold root

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Coding-guidelines enforcement ────────────────────────────────────────
  lint:
    name: Lint (StyLua + Selene)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # selene and stylua are pinned in aftman.toml alongside rojo/wally
      - name: Set up aftman toolchain
        uses: ok-nick/setup-aftman@v0.4.2

      # Verify that every .lua/.luau file matches the StyLua style rules
      # defined in stylua.toml (column width, indent, quote style, etc.).
      # Developers can auto-fix locally with: stylua .
      - name: Check formatting (StyLua)
        run: stylua --check --color auto .

      # Run Selene static analysis (clean code, unused variables, shadowing,
      # empty blocks).  Config lives in selene.toml; Roblox globals are
      # declared in roblox.yml so engine APIs do not produce false positives.
      - name: Static analysis (Selene)
        run: selene .

  # ── Build smoke test ──────────────────────────────────────────────────────
  build:
    name: Wally install + Rojo build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install rojo and wally via aftman using versions pinned in aftman.toml
      - name: Set up aftman toolchain
        uses: ok-nick/setup-aftman@v0.4.2

      # ── game-01 ──────────────────────────────────────────────────────────

      - name: Wally install (game-01)
        working-directory: games/game-01
        run: wally install

      - name: Rojo build (game-01)
        working-directory: games/game-01
        # Ensure Packages/ exists so Rojo can resolve $path even when wally
        # installs zero packages (all deps commented out in wally.toml).
        run: |
          mkdir -p Packages
          rojo build default.project.json --output /tmp/game-01.rbxlx

      # ── game-02 ──────────────────────────────────────────────────────────

      - name: Wally install (game-02)
        working-directory: games/game-02
        run: wally install

      - name: Rojo build (game-02)
        working-directory: games/game-02
        run: |
          mkdir -p Packages
          rojo build default.project.json --output /tmp/game-02.rbxlx

      # ── scaffold root (packages) ──────────────────────────────────────────

      - name: Rojo build (scaffold root)
        run: |
          mkdir -p Packages
          rojo build default.project.json --output /tmp/scaffold.rbxlx
