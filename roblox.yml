---
# Selene standard library definition for Roblox Luau globals.
#
# Prevents false-positive "undefined global" warnings for symbols that are
# injected by the Roblox engine at runtime and are therefore invisible to
# Selene's normal scope analysis.
#
# Reference: https://kampfkarren.github.io/selene/std.html

globals:
  # ── Engine singletons ────────────────────────────────────────────────────
  game:
    any: true
  workspace:
    any: true
  script:
    any: true
  plugin:
    any: true

  # ── Task scheduling ──────────────────────────────────────────────────────
  task:
    any: true

  # ── Type introspection ───────────────────────────────────────────────────
  typeof:
    args:
      - type: any
    returns:
      - type: string

  # ── Constructors ─────────────────────────────────────────────────────────
  Instance:
    any: true
  Vector3:
    any: true
  Vector2:
    any: true
  Vector3int16:
    any: true
  Vector2int16:
    any: true
  CFrame:
    any: true
  Color3:
    any: true
  BrickColor:
    any: true
  UDim:
    any: true
  UDim2:
    any: true
  TweenInfo:
    any: true
  NumberSequence:
    any: true
  NumberSequenceKeypoint:
    any: true
  ColorSequence:
    any: true
  ColorSequenceKeypoint:
    any: true
  NumberRange:
    any: true
  Region3:
    any: true
  Region3int16:
    any: true
  Ray:
    any: true
  Rect:
    any: true
  Axes:
    any: true
  Faces:
    any: true
  PathWaypoint:
    any: true
  PhysicalProperties:
    any: true
  Random:
    any: true
  RaycastParams:
    any: true
  OverlapParams:
    any: true

  # ── Enum namespace ───────────────────────────────────────────────────────
  Enum:
    any: true

  # ── Roblox utility functions ─────────────────────────────────────────────
  warn:
    args:
      - type: any
        required: false
  tick:
    returns:
      - type: number
  time:
    returns:
      - type: number
  elapsedTime:
    returns:
      - type: number

  # ── Deprecated scheduling helpers (still common in older code) ───────────
  wait:
    args:
      - type: number
        required: false
    returns:
      - type: number
      - type: number
  spawn:
    args:
      - type: function
  delay:
    args:
      - type: number
      - type: function

  # ── Cross-script shared table ─────────────────────────────────────────────
  shared:
    any: true
